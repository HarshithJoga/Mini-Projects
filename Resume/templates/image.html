<!DOCTYPE html>
<html>
<head>
    <title>AI Caption Generator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="container mt-5">
    <h2 class="text-center mb-4">📸 AI Caption Generator</h2>
    <div class="card p-4 shadow">
        <label>Platform</label>
        <select id="platform" class="form-control mb-3">
            <option>Instagram</option>
            <option>LinkedIn</option>
        </select>

        <label>Topic</label>
        <input type="text" id="topic" class="form-control mb-3" placeholder="Java Project Completion">

        <label>Tone</label>
        <select id="tone" class="form-control mb-3">
            <option>Professional</option>
            <option>Funny</option>
            <option>Motivational</option>
        </select>

        <button onclick="generate()" class="btn btn-primary w-100">
            Generate Captions 🚀
        </button>
    </div>

    <div class="card p-4 mt-4 shadow">
        <h5>Generated Captions</h5>
        <pre id="output"></pre>
    </div>
</div>
<script>
function generate() {
    document.getElementById("output").innerText = "⏳ Generating...";
    fetch("/generate", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            platform: document.getElementById("platform").value,
            topic: document.getElementById("topic").value,
            tone: document.getElementById("tone").value
        })
    })
    .then(res => res.json())
    .then(data => {

        if (data.result) {
            document.getElementById("output").innerText = data.result;
        } 
        // else {
        //     document.getElementById("output").innerText = "❌ Error occurred";
        // }
    })
    .catch(err => {
        document.getElementById("output").innerText = err;
    });
}
</script>

</body>
</html>
